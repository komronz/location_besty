name: location_besty
description: "A location management app using Flutter & SQLite."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.6

  # Immutable models & union types
  freezed_annotation: ^2.4.4

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Maps & location
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2

  # Camera / image
  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # Dependency injection
  get_it: ^8.0.2

  # Maps directions + reverse geocoding
  url_launcher: ^6.3.1
  geocoding: ^3.0.0

  # AI chat
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
